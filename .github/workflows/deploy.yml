name: Deploy Angular to S3

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: BookingWebApp/package-lock.json

      - name: Install dependencies
        working-directory: BookingWebApp
        run: npm ci

      # Optional gates (uncomment if you have them)
      # - name: Lint
      #   working-directory: BookingWebApp
      #   run: npm run lint
      # - name: Test
      #   working-directory: BookingWebApp
      #   run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build (production)
        working-directory: BookingWebApp
        run: npm run build -- --configuration production

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        env:
          BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          DIST_DIR=$(ls -d BookingWebApp/dist/* | head -n 1)
          echo "Deploying from: $DIST_DIR"
          aws s3 sync "$DIST_DIR" "s3://$BUCKET" --delete --only-show-errors
