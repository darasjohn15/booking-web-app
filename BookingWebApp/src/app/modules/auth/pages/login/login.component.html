<div class="page">
  <section class="hero" aria-hidden="true">
    <div class="brand">
      <div class="brand__mark"></div>
      <div class="brand__name">Book-A-Gig</div>
    </div>

    <img class="hero__art" src="assets/illustrations/book-a-gig-login.png" alt="" />
  </section>

  <section class="panel">
    <div class="card">
      <h1 class="title">Backstage access</h1>
      <p class="subtitle">Book shows. Find stages. Get paid.</p>

      <!-- error banner -->
      <div class="banner" *ngIf="loginFail">
        Wrong email or password. Try again.
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <label class="field">
          <span class="field__icon" aria-hidden="true">✉️</span>
          <input
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="Email address"
            formControlName="email"
          />
        </label>

        <p class="error" *ngIf="emailCtrl.touched && emailCtrl.invalid">
          Please enter a valid email.
        </p>

        <label class="field">
          <span class="field__icon" aria-hidden="true">🔒</span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            autocomplete="current-password"
            placeholder="Password"
            formControlName="password"
          />

          <button type="button" class="field__action" (click)="togglePassword()">
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </label>

        <p class="error" *ngIf="passwordCtrl.touched && passwordCtrl.invalid">
          Password must be at least 8 characters.
        </p>

        <a class="link subtle" routerLink="/auth/forgot-password">Forgot password?</a>

        <button class="btn" type="submit">Sign in</button>

        <div class="footer">
          <span class="subtle">New here?</span>
          <a class="link" routerLink="register">Join the lineup</a>
        </div>
      </form>
    </div>
  </section>
</div>
