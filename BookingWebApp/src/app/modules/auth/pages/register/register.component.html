<div class="auth-page">
  <div class="auth-bg"></div>

  <div class="auth-shell">
    <div class="brand">Book-A-Gig</div>

    <div class="auth-card">
      <h1 class="title">Sign Up</h1>
      <p class="subtitle">Join Book-A-Gig today! Create your account below.</p>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
        <!-- Name -->
        <div class="field">
          <input
            type="text"
            class="input"
            placeholder="Name"
            formControlName="name"
            autocomplete="name"
          />
          <small class="error" *ngIf="nameRequired">Name is required.</small>
        </div>

        <!-- Email -->
        <div class="field">
          <input
            type="email"
            class="input"
            placeholder="Email"
            formControlName="email"
            autocomplete="email"
          />
          <small class="error" *ngIf="emailRequired">Email is required.</small>
          <small class="error" *ngIf="emailFormatError && (registerForm.get('email')?.dirty || registerForm.get('email')?.touched)">
            Enter a valid email address.
          </small>
        </div>

        <!-- Password -->
        <div class="field">
          <input
            type="password"
            class="input"
            placeholder="Password"
            formControlName="password"
            autocomplete="new-password"
          />
          <small class="error" *ngIf="passwordRequired">Password is required.</small>
        </div>

        <!-- Confirm Password -->
        <div class="field">
          <input
            type="password"
            class="input"
            placeholder="Confirm Password"
            formControlName="confirmPassword"
            autocomplete="new-password"
          />
          <small class="error" *ngIf="confirmPasswordRequired">Confirm your password.</small>
          <small class="error" *ngIf="passwordsMismatch">Passwords do not match.</small>
        </div>

        <!-- Role Selector -->
        <div class="role-block">
          <div class="role-label">I'm a</div>

          <div class="role-toggle" role="tablist" aria-label="Role selector">
            <button
              type="button"
              class="role-pill"
              [class.active]="registerForm.value.role === 'host'"
              (click)="setRole('host')"
            >
              <span class="pill-icon">📅</span>
              Host
            </button>

            <button
              type="button"
              class="role-pill"
              [class.active]="registerForm.value.role === 'performer'"
              (click)="setRole('performer')"
            >
              <span class="pill-icon">🎤</span>
              Performer
            </button>
          </div>
        </div>

        <!-- CTA -->
        <button class="cta" type="submit" [disabled]="registerForm.invalid">
          Sign Up
        </button>

        <div class="footer">
          <span>Already have an account?</span>
          <a routerLink="/login">Log in</a>
        </div>
      </form>
    </div>
  </div>
</div>
